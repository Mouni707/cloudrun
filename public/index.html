<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beating Heart</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    font-family:Arial,Helvetica,sans-serif;
}

.container{
    text-align:center;
}

.heart{
    position:relative;
    width:180px;
    height:180px;
    background:#ff1744;
    transform:rotate(-45deg);
    animation:beat 1s infinite;
    box-shadow:0 0 30px #ff1744,
               0 0 60px #ff1744,
               0 0 100px #ff1744;
}

.heart:before,
.heart:after{
    content:"";
    position:absolute;
    width:180px;
    height:180px;
    background:#ff1744;
    border-radius:50%;
}

.heart:before{
    top:-90px;
    left:0;
}

.heart:after{
    left:90px;
    top:0;
}

@keyframes beat{

0%{
transform:rotate(-45deg) scale(1);
}

20%{
transform:rotate(-45deg) scale(1.15);
}

40%{
transform:rotate(-45deg) scale(1);
}

60%{
transform:rotate(-45deg) scale(1.18);
}

100%{
transform:rotate(-45deg) scale(1);
}

}

.text{
    margin-top:120px;
    color:white;
    font-size:38px;
    letter-spacing:3px;
    animation:glow 2s infinite alternate;
}

@keyframes glow{

from{
text-shadow:0 0 10px #fff;
}

to{
text-shadow:
0 0 20px #ff4d6d,
0 0 40px #ff1744,
0 0 60px #ff1744;
}

}

.particles span{
position:absolute;
width:12px;
height:12px;
background:#ff4d6d;
transform:rotate(45deg);
animation:float 6s linear infinite;
opacity:0.7;
}

.particles span:nth-child(1){
left:10%;
animation-delay:0s;
}

.particles span:nth-child(2){
left:30%;
animation-delay:1s;
}

.particles span:nth-child(3){
left:50%;
animation-delay:2s;
}

.particles span:nth-child(4){
left:70%;
animation-delay:3s;
}

.particles span:nth-child(5){
left:90%;
animation-delay:4s;
}

@keyframes float{

0%{
bottom:-20px;
opacity:0;
}

20%{
opacity:1;
}

100%{
bottom:110%;
opacity:0;
transform:rotate(45deg) scale(2);
}

}

</style>

</head>

<body>

<div class="particles">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<div class="container">
<div class="heart"></div>
<div class="text">❤️ Love Forever ❤️</div>
</div>

</body>

</html>
