name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: project-827c5156-ecae-479b-bb9
  REGION: us-central1
  REPOSITORY: hello-repo
  SERVICE: hello-cloud-run

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: |
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-repo/hello-python:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-repo/hello-python:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-repo/hello-python:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated